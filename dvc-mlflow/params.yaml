data:
  image_size: 224
  num_classes: 10
  batch_size: 64
  num_workers: 4

train:
  epochs: 3
  lr: 0.0001
  optimizer: adam
  weight_decay: 0.0001
  pretrained: true
  freeze_features: true
  seed: 42

mlflow:
  experiment_name: cifar10-vgg16-gpu
  run_name: vgg16_gpu_run_01

artifacts:
  model_path: artifacts/model.pt
  metrics_path: artifacts/metrics.json
  class_path: artifacts/classes.json
