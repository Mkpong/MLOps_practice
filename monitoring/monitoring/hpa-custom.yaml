apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: resnet-rps-hpa
  namespace: mlops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: resnet-inference
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "10"    # Pod 당 평균 10 RPS

