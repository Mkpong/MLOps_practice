# RBAC : Pod 디스커버리 권한 (Service Account 'default'에 view 부여)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: prom-pod-reader }
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: default
    namespace: monitoring
---
# Service : Prometheus UI를 NodePort 30900으로 노출
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: NodePort
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30900
---
# Deployment : Prometheus 서버 (config ConfigMap 마운트)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      containers:
        - name: prom
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prom/prometheus.yml"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: cfg
              mountPath: /etc/prom
      volumes:
        - name: cfg
          configMap:
            name: prometheus-config
