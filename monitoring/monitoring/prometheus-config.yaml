apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: 'resnet-inference'
        kubernetes_sd_configs:
          - role: pod
            namespaces: { names: [mlops] }
        relabel_configs:
          # app=inference 라벨이 붙은 Pod 만 스크레이프
          - { source_labels: [__meta_kubernetes_pod_label_app], action: keep, regex: inference }
          # 컨테이너 포트 8000 만 대상
          - { source_labels: [__meta_kubernetes_pod_container_port_number], action: keep, regex: "8000" }
          # namespace · pod 라벨 부여 (custom HPA 용)
          - { source_labels: [__meta_kubernetes_namespace], target_label: namespace }
          - { source_labels: [__meta_kubernetes_pod_name], target_label: pod }

