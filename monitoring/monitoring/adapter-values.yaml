# adapter-values.yaml — helm install 시 -f 로 전달
prometheus:
  url: http://prometheus.monitoring.svc
  port: 9090
rules:
  default: false
  custom:
    # ① RPS — 초당 요청 수 (Pod 단위)
    - seriesQuery: 'http_requests_total{namespace!="",pod!=""}'
      resources:
        overrides: { namespace: {resource: "namespace"}, pod: {resource: "pod"} }
      name: { matches: "^(.*)_total$", as: "${1}_per_second" }
      metricsQuery: 'sum(rate(<<.Series>>{<<.LabelMatchers>>}[1m])) by (<<.GroupBy>>)'
    # ② P95 지연 — Histogram 분위수 (Pod 단위)
    - seriesQuery: 'http_request_duration_seconds_bucket'
      resources:
        overrides: { namespace: {resource: "namespace"}, pod: {resource: "pod"} }
      name: { matches: "^(.*)_bucket$", as: "http_request_p95_seconds" }
      metricsQuery: 'histogram_quantile(0.95, sum by (le, <<.GroupBy>>) (rate(<<.Series>>{<<.LabelMatchers>>}[5m])))'

