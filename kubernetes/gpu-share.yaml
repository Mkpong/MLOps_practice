apiVersion: v1
kind: Pod
metadata:
  name: gpu-share-1
  labels:
    app: gpu-share
spec:
  restartPolicy: Never
  containers:
    - name: cuda
      image: nvidia/cuda:12.2.0-base-ubuntu22.04
      command: ["sh", "-c"]
      args:
        - |
          echo "===== Pod: gpu-share-1 =====";
          nvidia-smi -L;
          echo "";
          echo "===== Full nvidia-smi =====";
          nvidia-smi;
          sleep 300
      resources:
        limits:
          nvidia.com/gpu: 1
---
